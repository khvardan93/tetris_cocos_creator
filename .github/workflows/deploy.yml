name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: cocos/creator:3.8.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Web (WebGL)
        run: |
          /cocos/resources/CocosCreator \
            --project "$GITHUB_WORKSPACE" \
            --build "platform=web-desktop;buildPath=$GITHUB_WORKSPACE/build"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web-desktop

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
